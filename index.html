<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Core Engine & Tracking Libraries -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mind-ar-image-aframe.prod.js"></script>
  </head>
  
  <body>
    <!-- 
      - mindar-image: Links to your compiled .mind file 
      - filterMinCF & filterBeta: These stabilize the model so it doesn't "jitter" or shake on the table.
    -->
    <a-scene 
      mindar-image="imageTargetSrc: ./menu-marker.mind; autoStart: true; filterMinCF:0.001; filterBeta: 0.01;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights: true" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- 1. Name your scan file 'food.glb' and put it in the same folder as this HTML -->
        <a-asset-item id="food-model" src="./food.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- This entity attaches the model to the first marker in your .mind file -->
      <a-entity mindar-image-target="targetIndex: 0">
        
        <!-- THE DEBUG BOX: Keep this for now. If you see the box but not the food, the food file is the problem. -->
        <a-box position="0 0 0" scale="0.05 0.05 0.05" color="red" opacity="0.5"></a-box>

        <!-- 
          - src: Points to the asset ID above
          - rotation: You may need to change 90 to 0 depending on how the scan was exported (upright vs flat)
          - scale: Scans are often huge. 0.1 is a good starting point (10% of original size).
        -->
        <a-gltf-model 
          id="food-entity"
          src="#food-model" 
          position="0 0 0" 
          scale="0.1 0.1 0.1" 
          rotation="90 0 0">
        </a-gltf-model>

      </a-entity>
    </a-scene>
  </body>
</html>
