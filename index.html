<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Core Engine & Tracking Libraries -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://quadjr.github.io/aframe-gaussian-splatting/index.js"></script>
  </head>
  <body>
    <!-- The Scene Setup -->
    <a-scene mindar-image="imageTargetSrc: ./menu-marker.mind; autoStart: true;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- The Target Anchor -->
      <a-entity mindar-image-target="targetIndex: 0">
           <!-- YOUR 3D MODEL -->
           <a-entity gaussian_splatting="src: .Qatami.splat;" position="0 0 0" scale="1 1 1"></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
