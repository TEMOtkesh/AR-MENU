<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./menu-marker.mind; autoStart: true; uiLoading: no;" 
             renderer="colorManagement: true, physicallyCorrectLights"
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="food-model" src="./food.glb"></a-asset-item>
      </a-assets>

      <!-- LIGHTING: This makes sure your food isn't just a black silhouette -->
      <a-light type="ambient" intensity="1.5"></a-light>
      <a-light type="directional" position="0 1 1" intensity="1"></a-light>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
           
           <!-- THE DEBUG ANCHOR: A bright, glowing red box -->
           <a-box position="0 0 0" scale="0.1 0.1 0.1" material="color: red; emissive: red; emissiveIntensity: 0.5"></a-box>

           <!-- BACKUP OBJECT: A massive green sphere floating higher up -->
           <!-- If you see this green ball but not the food, your food.glb is broken -->
           <a-sphere position="0 0.5 0" radius="0.1" color="green"></a-sphere>

           <!-- THE FOOD MODEL -->
           <!-- We are using position 0 0 0 to stick it directly on the marker -->
           <a-entity gltf-model="#food-model" 
                     position="0 0 0" 
                     scale="1 1 1">
           </a-entity>
      
      </a-entity>
    </a-scene>
  </body>
</html>
