<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loading Menu...</title>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: sans-serif; 
            margin: 0; 
        }
    </style>
</head>
<body>
    <h2>Loading 3D Menu...</h2>

    <script>
        async function routeUser() {
            // Check iOS Quick Look support
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const a = document.createElement('a');
            const supportsQuickLook = a.relList && a.relList.supports && a.relList.supports('ar');

            // Check Android WebXR/ARCore support
            let supportsWebXR = false;
            if (navigator.xr) {
                try { 
                    supportsWebXR = await navigator.xr.isSessionSupported('immersive-ar'); 
                } catch (e) { 
                    supportsWebXR = false; 
                }
            }

            // Route based on capabilities
            // Using replace() so they can't hit the "Back" button and get stuck in a loop
            if ((isIOS && supportsQuickLook) || supportsWebXR) {
                window.location.replace("advanced-ar.html");
            } else {
                window.location.replace("mind-ar-fallback.html");
            }
        }

        // Execute immediately
        routeUser();
    </script>
</body>
</html>
