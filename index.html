<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AR Menu</title>

  <!-- COOP/COEP headers via service worker -->
  <script src="./coi-serviceworker.js"></script>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: sans-serif; }

    #splash {
      position: fixed; inset: 0;
      background: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; z-index: 9999;
    }
    #splash h1 { font-size: 26px; font-weight: 600; }
    #splash p  { font-size: 15px; color: #666; text-align: center; padding: 0 2rem; }
    #start-btn {
      padding: 14px 36px; font-size: 17px; font-weight: 600;
      background: #e63946; color: #fff;
      border: none; border-radius: 50px;
      cursor: pointer; transition: transform .15s;
    }
    #start-btn:active { transform: scale(0.95); }

    #hint {
      position: fixed; bottom: 40px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.55); color: #fff;
      padding: 10px 22px; border-radius: 50px;
      font-size: 14px; z-index: 999;
      pointer-events: none;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="splash">
    <h1>🍽 Our Menu</h1>
    <p>Point your camera at the table artwork<br>to see the dish in 3D.</p>
    <button id="start-btn">Start AR</button>
  </div>

  <div id="hint" class="hidden">Point at the table marker...</div>

  <a-scene
    mindar-image="imageTargetSrc: ./menu-marker.mind; autoStart: false; filterMinCF: 0.001; filterBeta: 0.01;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >

    <a-assets>
      <a-asset-item id="food-model" src="./food.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient"    intensity="0.8"></a-light>
    <a-light type="directional" intensity="1.2" position="1 3 2"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="#food-model"
        position="0 0 0"
        rotation="0 0 0"
        scale="0.1 0.1 0.1"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
      ></a-gltf-model>
    </a-entity>

  </a-scene>

  <script>
    const splash   = document.getElementById('splash');
    const hint     = document.getElementById('hint');
    const startBtn = document.getElementById('start-btn');
    const sceneEl  = document.querySelector('a-scene');

    startBtn.addEventListener('click', () => {
      splash.classList.add('hidden');
      hint.classList.remove('hidden');
      sceneEl.systems['mindar-image-system'].start();
    });

    sceneEl.addEventListener('targetFound', () => {
      hint.textContent = '✓ Marker found!';
      setTimeout(() => hint.classList.add('hidden'), 2000);
    });

    sceneEl.addEventListener('targetLost', () => {
      hint.textContent = 'Point at the table marker...';
      hint.classList.remove('hidden');
    });
  </script>

</body>
</html>
