<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AR Menu</title>

  <script src="./coi-serviceworker.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: sans-serif; }

    #hint {
      position: fixed; bottom: 40px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.6); color: #fff;
      padding: 10px 24px; border-radius: 50px;
      font-size: 15px; z-index: 999;
      pointer-events: none; white-space: nowrap;
      transition: opacity .3s;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="hint">Point at the table marker...</div>

  <a-scene
    mindar-image="imageTargetSrc: ./menu-marker.mind;
                  autoStart: true;
                  filterMinCF: 0.001;
                  filterBeta: 0.01;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >

    <a-light type="ambient"     intensity="0.8"></a-light>
    <a-light type="directional" intensity="1.2" position="1 3 2"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="./food.glb"
        position="0 0 0"
        rotation="0 0 0"
        scale="0.1 0.1 0.1"
        animation="property: rotation; to: 0 360 0;
                   loop: true; dur: 8000; easing: linear"
      ></a-gltf-model>
    </a-entity>

  </a-scene>

  <script>
    const hint    = document.getElementById('hint');
    const sceneEl = document.querySelector('a-scene');

    sceneEl.addEventListener('targetFound', () => {
      hint.textContent = '✓ Got it!';
      setTimeout(() => hint.classList.add('hidden'), 1500);
    });

    sceneEl.addEventListener('targetLost', () => {
      hint.classList.remove('hidden');
      hint.textContent = 'Point at the table marker...';
    });
  </script>

</body>
</html>
