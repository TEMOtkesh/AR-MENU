<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Instant AR Menu</title>
    <!-- Core Engines -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mind-ar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        /* The UI that shows up before the camera starts */
        #ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; text-align: center;
        }
        #start-button {
            padding: 15px 30px; font-size: 20px; font-weight: bold;
            background: #e63946; color: white; border: none; border-radius: 50px;
            cursor: pointer; transition: 0.3s;
        }
        #start-button:active { transform: scale(0.95); }
        .hidden { display: none !important; }
    </style>
</head>

<body>
    <!-- 1. The UX Start Screen (Required for most Android/iPhones) -->
    <div id="ui-overlay">
        <h1>Welcome to [Restaurant Name]</h1>
        <p>Tap to see our 3D Menu</p>
        <button id="start-button">START AR</button>
    </div>

    <!-- 2. The AR Scene -->
    <!-- 'autoStart: false' allows our button to trigger the camera manually -->
    <a-scene 
        mindar-image="imageTargetSrc: ./menu-marker.mind; autoStart: false; filterMinCF:0.001; filterBeta: 0.01;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
      
        <a-assets>
            <a-asset-item id="food-model" src="./food.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <!-- DEBUG BOX: Confirms tracking is active -->
            <a-box position="0 0 0" scale="0.05 0.05 0.05" color="red" opacity="0.5"></a-box>

            <a-gltf-model 
                src="#food-model" 
                position="0 0 0" 
                scale="0.1 0.1 0.1" 
                rotation="90 0 0">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector("#start-button");
        const uiOverlay = document.querySelector("#ui-overlay");
        const sceneEl = document.querySelector('a-scene');

        // When the user clicks the button:
        startButton.addEventListener('click', () => {
            uiOverlay.classList.add('hidden'); // Hide the button
            
            // Start the AR system
            const { systems } = sceneEl;
            systems['mindar-image-system'].start(); 
            
            console.log("AR Started by User");
        });

        // Error handling if camera fails
        sceneEl.addEventListener("arError", (event) => {
            alert("Camera Error: Please ensure you are using HTTPS and have granted camera permissions.");
        });
    </script>
</body>
</html>
