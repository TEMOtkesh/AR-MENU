<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loading Menu...</title>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: sans-serif; 
            margin: 0; 
        }
    </style>
</head>
<body>
    <h2>Loading 3D Menu...</h2>

    <script>
        function routeUser() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            
            // 1. Bulletproof Apple Check
            const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
            const a = document.createElement('a');
            const supportsQuickLook = a.relList && a.relList.supports && a.relList.supports('ar');

            // 2. The Hard OS Split
            if (isIOS && supportsQuickLook) {
                // Perfect iPhones get the native Google Model Viewer
                window.location.replace("advanced-ar.html");
            } 
            else {
                // EVERYONE ELSE (Poco, Xiaomi, Samsung, Desktop)
                // Automatically routed straight to the working MindAR camera. No lies, no white screens.
                window.location.replace("mind-ar-fallback.html");
            }
        }

        // Execute immediately
        routeUser();
    </script>
</body>
</html>
